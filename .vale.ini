StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Elegua

Packages = Google

# Project docs and README — full style checking
[*.md]
BasedOnStyles = Vale, Google
Google.EmDash = NO
Google.Headings = NO
Google.FirstPerson = NO

# Internal design docs and specs — relaxed rules (spelling only)
[.wai/**/*.md]
BasedOnStyles = Vale
Vale.Spelling = warning

[openspec/**/*.md]
BasedOnStyles = Vale
Vale.Spelling = warning

# Python source and tests
[*.py]
BasedOnStyles = Vale, Google
Google.EmDash = NO
Google.Units = NO
Google.Ellipses = NO
Google.We = NO
Google.Will = NO
Google.Headings = NO
Google.FirstPerson = NO
Vale.Spelling = warning
