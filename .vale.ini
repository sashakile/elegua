StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Elegua

Packages = Google

# Only lint prose files — skip code
[*.md]
BasedOnStyles = Vale, Google
Google.EmDash = NO

[*.py]
BasedOnStyles = Vale, Google
# Disable rules that clash with code conventions
Google.EmDash = NO
Google.Units = NO
Google.Ellipses = NO
Google.We = NO
Google.Will = NO
Google.Headings = NO
# Code identifiers in docstrings are not typos
Vale.Spelling = warning
