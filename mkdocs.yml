site_name: Eleguá
site_description: Domain-agnostic multi-tier test harness for validating mathematical equivalence
repo_url: https://github.com/sashakile/elegua
repo_name: sashakile/elegua

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

nav:
  - Home: index.md
  - Evaluate Eleguá:
      - Getting Started: getting-started.md
      - Architecture: architecture.md
  - Build an adapter:
      - Task Lifecycle: guide/tasks.md
      - Writing Adapters: guide/adapters.md
      - Comparison Pipeline: guide/comparison.md
  - Core Features:
      - Property Testing: guide/property-testing.md
      - Oracle Servers: guide/oracle-servers.md
      - Blob Store: guide/blob-store.md
      - TOML Format: guide/toml-format.md
  - Contribute:
      - Development: development.md
      - API Reference: reference/
